# Ghost Configuration File
# Copy to /etc/ghost/config and modify as needed

# ============================================
# TOR SETTINGS
# ============================================
# TOR_MODE: "dedicated" (ghost's own Tor) or "system" (use system Tor)
TOR_MODE="dedicated"

# TOR_BRIDGES: "none", "obfs4", "vanilla", "snowflake"
TOR_BRIDGES="none"

# TOR_BANDWIDTH_RATE: Rate limit in KB/s (0 = unlimited)
TOR_BANDWIDTH_RATE=0

# TOR_BANDWIDTH_BURST: Burst limit in KB/s
TOR_BANDWIDTH_BURST=0

# ============================================
# SECURITY SETTINGS
# ============================================
# HIDE_HARDWARE: 1 = fake CPU/meminfo/version, 0 = real values
HIDE_HARDWARE=1

# TMPFS_HOME: 1 = RAM-backed home dir, 0 = regular temp dir
TMPFS_HOME=1

# TMPFS_HOME_SIZE: Size of tmpfs home (if enabled)
TMPFS_HOME_SIZE="200M"

# ENABLE_SECCOMP: 1 = enforce seccomp-bpf, 0 = skip (insecure!)
ENABLE_SECCOMP=1

# ENABLE_LANDLOCK: 1 = enforce landlock, 0 = skip
ENABLE_LANDLOCK=1

# ENABLE_CAPS_DROP: 1 = drop capabilities, 0 = skip (insecure!)
ENABLE_CAPS_DROP=1

# ============================================
# COVER TRAFFIC
# ============================================
# ENABLE_COVER_TRAFFIC: 1 = auto-start cover traffic, 0 = manual
ENABLE_COVER_TRAFFIC=0

# COVER_TRAFFIC_INTERVAL: Seconds between cover requests (10-120)
COVER_TRAFFIC_INTERVAL=60

# ============================================
# IDENTITY ROTATION
# ============================================
# AUTO_IDENTITY_ROTATION: 1 = periodically rotate exit node
AUTO_IDENTITY_ROTATION=0

# AUTO_IDENTITY_INTERVAL: Minutes between identity rotations (5-60)
AUTO_IDENTITY_INTERVAL=30

# ============================================
# LOGGING
# ============================================
# LOG_LEVEL: ERROR, WARN, INFO, DEBUG
LOG_LEVEL="INFO"

# ENCRYPT_SESSION_LOGS: 1 = encrypt session logs with AES-256
ENCRYPT_SESSION_LOGS=0

# ============================================
# ADVANCED
# ============================================
# GHOST_PROFILE: Override with environment variable
# Usage: sudo GHOST_PROFILE=paranoid ghost start
# GHOST_PROFILE=""
